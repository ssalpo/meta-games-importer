<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Metea Games Importer</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup">
      <header class="header">
        <div>
          <h1>Продукты</h1>
          <p>Список товаров для публикации</p>
        </div>
        <button id="refreshButton" class="icon-button" type="button" title="Обновить">↻</button>
      </header>

      <section class="account-panel">
        <label for="accountSelect">Аккаунт</label>
        <select id="accountSelect">
          <option value="">Выберите аккаунт</option>
        </select>
      </section>

      <section class="bulk-panel">
        <button id="publishAllButton" class="bulk-button" type="button" disabled>Опубликовать все</button>
      </section>

      <section id="status" class="status">Загрузка...</section>
      <section id="productList" class="product-list" aria-live="polite"></section>
      <nav id="pagination" class="pagination" aria-label="Страницы продуктов" hidden>
        <button id="prevPageButton" class="page-button" type="button">Назад</button>
        <span id="pageInfo" class="page-info"></span>
        <button id="nextPageButton" class="page-button" type="button">Вперед</button>
      </nav>
    </main>

    <template id="productTemplate">
      <article class="product">
        <div class="product-main">
          <div class="product-title"></div>
          <div class="product-meta"></div>
        </div>
        <button class="publish-button" type="button">Опубликовать</button>
      </article>
    </template>

    <script src="popup.js"></script>
  </body>
</html>
